<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AdGenAI — Generate Everything. Dominate Everywhere.</title>
  <meta name="description" content="AdGenAI: AI-powered ad creation, testing, and analytics." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2300ff88'/><text x='50' y='58' font-size='46' text-anchor='middle' font-family='Arial' fill='black'>AI</text></svg>">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    /* Northern Ventures Splash Screen Styles */
    .northern-ventures-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: 
        linear-gradient(180deg, 
          #0a0a1a 0%,
          #1a0f2e 20%,
          #2a1854 40%,
          #1a0f2e 60%,
          #0a0a1a 80%,
          #000000 100%
        ),
        radial-gradient(ellipse 80% 30% at 50% 20%, 
          rgba(64, 224, 159, 0.3) 0%,
          rgba(96, 165, 250, 0.2) 30%,
          rgba(139, 92, 246, 0.1) 60%,
          transparent 100%
        );
      animation: fadeIn 0.8s ease-out;
    }

    .northern-ventures-splash.fade-out {
      animation: fadeOut 0.5s ease-out forwards;
    }

    .aurora-bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      animation: aurora 4s ease-in-out infinite;
    }

    .landscape {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 33%;
    }

    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      color: white;
      font-family: 'Inter', sans-serif;
      animation: slideUp 0.8s ease-out 0.3s both;
    }

    .logo {
      width: 128px;
      height: 128px;
      margin: 0 auto 2rem;
      animation: spin-slow 8s linear infinite;
    }

    .title {
      font-size: 4rem;
      font-weight: bold;
      margin-bottom: 1rem;
      letter-spacing: 0.2em;
      animation: fadeInUp 0.6s ease-out 0.6s both;
    }

    .subtitle {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 2rem;
      letter-spacing: 0.2em;
      animation: fadeInUp 0.6s ease-out 0.9s both;
    }

    .divider {
      width: 12rem;
      height: 4px;
      background: linear-gradient(to right, #10b981, #3b82f6, #8b5cf6, #ec4899);
      margin: 0 auto;
      animation: expandWidth 0.8s ease-out 1.2s both;
    }

    .click-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.875rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    @keyframes fadeInUp {
      from { 
        opacity: 0; 
        transform: translateY(30px);
      }
      to { 
        opacity: 1; 
        transform: translateY(0);
      }
    }

    @keyframes slideUp {
      from { 
        opacity: 0; 
        transform: translateY(50px) scale(0.9);
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1);
      }
    }

    @keyframes expandWidth {
      from { width: 0; }
      to { width: 12rem; }
    }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    @keyframes aurora {
      0% { 
        background: radial-gradient(ellipse 80% 30% at 50% 20%, rgba(64, 224, 159, 0.3), transparent);
      }
      33% { 
        background: radial-gradient(ellipse 80% 30% at 60% 25%, rgba(96, 165, 250, 0.3), transparent);
      }
      66% { 
        background: radial-gradient(ellipse 80% 30% at 40% 20%, rgba(139, 92, 246, 0.3), transparent);
      }
      100% { 
        background: radial-gradient(ellipse 80% 30% at 50% 20%, rgba(64, 224, 159, 0.3), transparent);
      }
    }

    @media (max-width: 768px) {
      .title { font-size: 2.5rem; }
      .subtitle { font-size: 2rem; }
      .logo { width: 96px; height: 96px; }
    }
  </style>
</head>
<body>
  <!-- Northern Ventures Splash Screen -->
  <div id="northern-ventures-splash" class="northern-ventures-splash">
    <div class="aurora-bg"></div>
    
    <div class="landscape">
      <svg style="position: absolute; bottom: 0; width: 100%; height: 100%;" viewBox="0 0 1200 400" preserveAspectRatio="none">
        <path d="M0,400 L0,300 Q200,200 400,250 Q600,180 800,220 Q1000,160 1200,200 L1200,400 Z" fill="rgba(255, 255, 255, 0.9)"/>
        <path d="M0,400 L0,350 Q300,280 600,320 Q900,260 1200,300 L1200,400 Z" fill="rgba(255, 255, 255, 0.7)"/>
      </svg>
      
      <!-- Pine trees -->
      <svg style="position: absolute; bottom: 4rem; left: 2.5rem; width: 2rem; height: 5rem; opacity: 0.6;" viewBox="0 0 24 48" fill="black">
        <path d="M12 2 L8 12 L16 12 Z" />
        <path d="M12 8 L7 18 L17 18 Z" />
        <path d="M12 14 L6 24 L18 24 Z" />
        <rect x="11" y="24" width="2" height="24" />
      </svg>
      <svg style="position: absolute; bottom: 5rem; left: 7rem; width: 1.5rem; height: 4rem; opacity: 0.5;" viewBox="0 0 24 48" fill="black">
        <path d="M12 2 L8 12 L16 12 Z" />
        <path d="M12 8 L7 18 L17 18 Z" />
        <path d="M12 14 L6 24 L18 24 Z" />
        <rect x="11" y="24" width="2" height="24" />
      </svg>
      <svg style="position: absolute; bottom: 3.5rem; right: 5rem; width: 2.5rem; height: 6rem; opacity: 0.7;" viewBox="0 0 24 48" fill="black">
        <path d="M12 2 L8 12 L16 12 Z" />
        <path d="M12 8 L7 18 L17 18 Z" />
        <path d="M12 14 L6 24 L18 24 Z" />
        <rect x="11" y="24" width="2" height="24" />
      </svg>
    </div>

    <div class="content">
      <div class="logo">
        <svg viewBox="0 0 120 120" fill="none">
          <circle cx="60" cy="60" r="55" stroke="url(#logoGradient)" stroke-width="2" fill="none" stroke-dasharray="10 5"/>
          <g transform="translate(60,60)">
            <path d="M0,-35 L-15,-10 L15,-10 Z" fill="url(#logoGradient)" />
            <path d="M0,35 L-15,10 L15,10 Z" fill="url(#logoGradient)" />
            <path d="M35,0 L10,-15 L10,15 Z" fill="url(#logoGradient)" />
            <path d="M-35,0 L-10,-15 L-10,15 Z" fill="url(#logoGradient)" />
          </g>
          <path d="M60,40 L75,60 L60,80 L45,60 Z" fill="white" />
          <defs>
            <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#10b981" />
              <stop offset="33%" stop-color="#3b82f6" />
              <stop offset="66%" stop-color="#8b5cf6" />
              <stop offset="100%" stop-color="#ec4899" />
            </linearGradient>
          </defs>
        </svg>
      </div>
      
      <h1 class="title">NORTHERN</h1>
      <h2 class="subtitle">VENTURES</h2>
      <div class="divider"></div>
    </div>

    <p class="click-hint">Click anywhere to continue</p>
  </div>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  
  <script>
    // Handle splash screen
    const splash = document.getElementById('northern-ventures-splash');
    
    function closeSplash() {
      splash.classList.add('fade-out');
      setTimeout(() => {
        splash.style.display = 'none';
      }, 500);
    }
    
    // Close on click
    splash.addEventListener('click', closeSplash);
    
    // Auto-close after 4 seconds
    setTimeout(closeSplash, 4000);
  </script>
</body>
</html>
