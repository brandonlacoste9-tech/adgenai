<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Aurora gradient definitions -->
    <linearGradient id="auroraGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981">
        <animate attributeName="stop-color" 
                 values="#10b981;#06b6d4;#a855f7;#10b981" 
                 dur="4s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" 
                 values="#06b6d4;#a855f7;#10b981;#06b6d4" 
                 dur="4s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" 
                 values="#a855f7;#10b981;#06b6d4;#a855f7" 
                 dur="4s" 
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="auroraGradient2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22c55e">
        <animate attributeName="stop-color" 
                 values="#22c55e;#8b5cf6;#06b6d4;#22c55e" 
                 dur="5s" 
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8b5cf6">
        <animate attributeName="stop-color" 
                 values="#8b5cf6;#06b6d4;#22c55e;#8b5cf6" 
                 dur="5s" 
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Aurora shimmer filter -->
    <filter id="shimmer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feSpecularLighting result="specOut" in="blur" specularConstant="1.5" specularExponent="20" lighting-color="#ffffff">
        <fePointLight x="50" y="25" z="200">
          <animate attributeName="x" values="50;150;50" dur="3s" repeatCount="indefinite"/>
        </fePointLight>
      </feSpecularLighting>
      <feComposite in="specOut" in2="SourceAlpha" operator="in" result="specOut2"/>
      <feComposite in="SourceGraphic" in2="specOut2" operator="arithmetic" k1="0" k2="1" k3="1" k4="0"/>
    </filter>

    <!-- Mask for the northern lights effect -->
    <mask id="northernLightsMask">
      <rect width="200" height="200" fill="white"/>
      <path d="M0,80 Q50,60 100,80 T200,80 L200,120 Q150,140 100,120 T0,120 Z" fill="black">
        <animateTransform attributeName="transform" 
                         type="translate" 
                         values="0,0;20,-10;0,0" 
                         dur="6s" 
                         repeatCount="indefinite"/>
      </path>
    </mask>
  </defs>

  <!-- Background circle with aurora effect -->
  <circle cx="100" cy="100" r="90" 
          fill="none" 
          stroke="url(#auroraGradient1)" 
          stroke-width="3" 
          opacity="0.6">
    <animate attributeName="r" 
             values="90;95;90" 
             dur="3s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.6;0.9;0.6" 
             dur="2s" 
             repeatCount="indefinite"/>
  </circle>

  <!-- Northern lights background waves -->
  <path d="M20,100 Q70,80 120,100 T180,100" 
        fill="none" 
        stroke="url(#auroraGradient2)" 
        stroke-width="2" 
        opacity="0.4">
    <animate attributeName="d" 
             values="M20,100 Q70,80 120,100 T180,100;M20,110 Q70,90 120,110 T180,110;M20,100 Q70,80 120,100 T180,100" 
             dur="4s" 
             repeatCount="indefinite"/>
  </path>

  <path d="M20,120 Q70,140 120,120 T180,120" 
        fill="none" 
        stroke="url(#auroraGradient1)" 
        stroke-width="2" 
        opacity="0.3">
    <animate attributeName="d" 
             values="M20,120 Q70,140 120,120 T180,120;M20,110 Q70,130 120,110 T180,110;M20,120 Q70,140 120,120 T180,120" 
             dur="5s" 
             repeatCount="indefinite"/>
  </path>

  <!-- Letter N -->
  <g filter="url(#logoGlow)">
    <path d="M45,60 L45,140 L50,140 L50,75 L75,140 L80,140 L80,60 L75,60 L75,125 L50,60 Z" 
          fill="url(#auroraGradient1)"
          stroke="url(#auroraGradient2)"
          stroke-width="1">
      <animateTransform attributeName="transform" 
                       type="scale" 
                       values="1;1.05;1" 
                       dur="3s" 
                       repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Letter V -->
  <g filter="url(#logoGlow)">
    <path d="M120,60 L135,140 L140,140 L155,60 L150,60 L137.5,130 L125,60 Z" 
          fill="url(#auroraGradient1)"
          stroke="url(#auroraGradient2)"
          stroke-width="1">
      <animateTransform attributeName="transform" 
                       type="scale" 
                       values="1;1.05;1" 
                       dur="3s" 
                       repeatCount="indefinite"
                       begin="0.5s"/>
    </path>
  </g>

  <!-- Central aurora orb -->
  <circle cx="100" cy="100" r="25" 
          fill="url(#auroraGradient2)" 
          opacity="0.3"
          filter="url(#shimmer)">
    <animate attributeName="r" 
             values="25;30;25" 
             dur="4s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.3;0.6;0.3" 
             dur="2s" 
             repeatCount="indefinite"/>
  </circle>

  <!-- Floating aurora particles -->
  <circle cx="60" cy="70" r="2" fill="#10b981" opacity="0.8">
    <animate attributeName="cy" 
             values="70;50;70" 
             dur="6s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.8;0.3;0.8" 
             dur="3s" 
             repeatCount="indefinite"/>
  </circle>

  <circle cx="140" cy="130" r="2" fill="#06b6d4" opacity="0.8">
    <animate attributeName="cy" 
             values="130;150;130" 
             dur="5s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.8;0.4;0.8" 
             dur="4s" 
             repeatCount="indefinite"/>
  </circle>

  <circle cx="160" cy="80" r="1.5" fill="#a855f7" opacity="0.9">
    <animate attributeName="cx" 
             values="160;140;160" 
             dur="7s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.9;0.2;0.9" 
             dur="2.5s" 
             repeatCount="indefinite"/>
  </circle>

  <circle cx="40" cy="120" r="1.5" fill="#22c55e" opacity="0.7">
    <animate attributeName="cx" 
             values="40;60;40" 
             dur="8s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.7;0.3;0.7" 
             dur="3.5s" 
             repeatCount="indefinite"/>
  </circle>

  <!-- Subtle constellation lines -->
  <line x1="60" y1="70" x2="100" y2="100" 
        stroke="url(#auroraGradient1)" 
        stroke-width="0.5" 
        opacity="0.3">
    <animate attributeName="opacity" 
             values="0.3;0.7;0.3" 
             dur="4s" 
             repeatCount="indefinite"/>
  </line>

  <line x1="140" y1="130" x2="100" y2="100" 
        stroke="url(#auroraGradient2)" 
        stroke-width="0.5" 
        opacity="0.3">
    <animate attributeName="opacity" 
             values="0.3;0.6;0.3" 
             dur="5s" 
             repeatCount="indefinite"/>
  </line>

  <!-- Outer ring pulsing effect -->
  <circle cx="100" cy="100" r="95" 
          fill="none" 
          stroke="url(#auroraGradient1)" 
          stroke-width="1" 
          opacity="0.2">
    <animate attributeName="r" 
             values="95;100;95" 
             dur="6s" 
             repeatCount="indefinite"/>
    <animate attributeName="opacity" 
             values="0.2;0.5;0.2" 
             dur="3s" 
             repeatCount="indefinite"/>
  </circle>

  <!-- Company name text (hidden by default for logo mark) -->
  <text x="100" y="170" 
        text-anchor="middle" 
        font-family="Inter, sans-serif" 
        font-size="16" 
        font-weight="600" 
        fill="url(#auroraGradient1)"
        opacity="0"
        class="company-text">
    NORTHERN VENTURES
    <animate attributeName="opacity" 
             values="0;1;0" 
             dur="8s" 
             repeatCount="indefinite"
             begin="2s"/>
  </text>
</svg>