<svg viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="whiteGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo Mark -->
  <g transform="translate(5, 5)">
    <!-- Outer ring -->
    <circle cx="25" cy="25" r="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4" />
    
    <!-- Neural network nodes -->
    <circle cx="15" cy="12" r="2" fill="#ffffff" opacity="0.8" />
    <circle cx="35" cy="12" r="2" fill="#ffffff" opacity="0.8" />
    <circle cx="10" cy="25" r="2" fill="#f1f5f9" opacity="0.9" />
    <circle cx="40" cy="25" r="2" fill="#f1f5f9" opacity="0.9" />
    <circle cx="15" cy="38" r="2" fill="#e2e8f0" opacity="0.8" />
    <circle cx="35" cy="38" r="2" fill="#e2e8f0" opacity="0.8" />
    
    <!-- Central AI core -->
    <circle cx="25" cy="25" r="9" fill="#ffffff" filter="url(#whiteGlow)" />
    
    <!-- Lightning bolt -->
    <path d="M22 20 L26 20 L24 25 L28 25 L24 30 L26 30 L22 30 Z" fill="#2563eb" transform="translate(0, -2.5)" />
    
    <!-- Connection lines -->
    <line x1="15" y1="12" x2="18" y2="18" stroke="#f1f5f9" stroke-width="1" opacity="0.6" />
    <line x1="35" y1="12" x2="32" y2="18" stroke="#f1f5f9" stroke-width="1" opacity="0.6" />
    <line x1="10" y1="25" x2="16" y2="25" stroke="#f1f5f9" stroke-width="1" opacity="0.6" />
    <line x1="40" y1="25" x2="34" y2="25" stroke="#f1f5f9" stroke-width="1" opacity="0.6" />
    <line x1="15" y1="38" x2="18" y2="32" stroke="#e2e8f0" stroke-width="1" opacity="0.6" />
    <line x1="35" y1="38" x2="32" y2="32" stroke="#e2e8f0" stroke-width="1" opacity="0.6" />
  </g>
  
  <!-- Text -->
  <text x="65" y="35" font-family="Inter, sans-serif" font-size="24" font-weight="700" fill="#ffffff">
    AdGen AI
  </text>
</svg>