<svg viewBox="0 0 50 50" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="markGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#60a5fa" />
    </linearGradient>
    <filter id="markGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring -->
  <circle cx="25" cy="25" r="22" fill="none" stroke="#2563eb" stroke-width="1.5" opacity="0.3" />
  
  <!-- Neural network nodes -->
  <circle cx="15" cy="12" r="2" fill="#2563eb" opacity="0.8" />
  <circle cx="35" cy="12" r="2" fill="#2563eb" opacity="0.8" />
  <circle cx="10" cy="25" r="2" fill="#3b82f6" opacity="0.9" />
  <circle cx="40" cy="25" r="2" fill="#3b82f6" opacity="0.9" />
  <circle cx="15" cy="38" r="2" fill="#60a5fa" opacity="0.8" />
  <circle cx="35" cy="38" r="2" fill="#60a5fa" opacity="0.8" />
  
  <!-- Central AI core -->
  <circle cx="25" cy="25" r="9" fill="url(#markGradient)" filter="url(#markGlow)" />
  
  <!-- Lightning bolt -->
  <path d="M22 20 L26 20 L24 25 L28 25 L24 30 L26 30 L22 30 Z" fill="white" transform="translate(0, -2.5)" />
  
  <!-- Connection lines -->
  <line x1="15" y1="12" x2="18" y2="18" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  <line x1="35" y1="12" x2="32" y2="18" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  <line x1="10" y1="25" x2="16" y2="25" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  <line x1="40" y1="25" x2="34" y2="25" stroke="#3b82f6" stroke-width="1" opacity="0.6" />
  <line x1="15" y1="38" x2="18" y2="32" stroke="#60a5fa" stroke-width="1" opacity="0.6" />
  <line x1="35" y1="38" x2="32" y2="32" stroke="#60a5fa" stroke-width="1" opacity="0.6" />
  
  <!-- Animated data flow -->
  <circle cx="25" cy="8" r="1" fill="#60a5fa">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="42" cy="25" r="1" fill="#60a5fa">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="0.5s" />
  </circle>
  <circle cx="25" cy="42" r="1" fill="#60a5fa">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1s" />
  </circle>
  <circle cx="8" cy="25" r="1" fill="#60a5fa">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite" begin="1.5s" />
  </circle>
</svg>